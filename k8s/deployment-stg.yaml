apiVersion: apps/v1
kind: Deployment
metadata:
  name: activity-service-stg
  namespace: staging
  labels:
    app: activity-service-stg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: activity-service-stg
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: activity-service-stg
    spec:
      containers:
        - name: activity-service
          image: host.minikube.internal:5000/activity_service_stg:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: TZ
              value: "Asia/Singapore"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: log-volume
              mountPath: /app/logs
      volumes:
        - name: log-volume
          hostPath:
            path: /home/VMadmin/FYP_microservices/PEAR_activity_service_stg/logs
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: activity-service-stg
  namespace: staging
spec:
  type: NodePort
  selector:
    app: activity-service-stg
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30010